<svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gmail Unsubscriber — Bulk-unsubscribe from Gmail promotions, safely skip your bank, doctor, and boss">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bgGrad)"/>

  <!-- Subtle dot grid -->
  <g fill="#334155" opacity="0.4">
    <circle cx="60" cy="60" r="1.5"/>
    <circle cx="120" cy="60" r="1.5"/>
    <circle cx="180" cy="60" r="1.5"/>
    <circle cx="60" cy="120" r="1.5"/>
    <circle cx="120" cy="120" r="1.5"/>
    <circle cx="180" cy="120" r="1.5"/>
    <circle cx="1020" cy="240" r="1.5"/>
    <circle cx="1080" cy="240" r="1.5"/>
    <circle cx="1140" cy="240" r="1.5"/>
    <circle cx="1020" cy="300" r="1.5"/>
    <circle cx="1080" cy="300" r="1.5"/>
    <circle cx="1140" cy="300" r="1.5"/>
  </g>

  <!-- Title -->
  <text x="600" y="115" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="76" font-weight="700" fill="#ffffff" letter-spacing="-2">Gmail Unsubscriber</text>

  <!-- Slogan -->
  <text x="600" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="400" fill="#cbd5e1">Bulk-unsubscribe from promotions. Safely skip your bank, doctor, and boss.</text>

  <!-- Envelopes row -->
  <!-- Promo 1 (X'd out) -->
  <g transform="translate(420, 235)">
    <rect x="-30" y="-20" width="60" height="40" rx="3" fill="#334155" stroke="#64748b" stroke-width="1.5" opacity="0.5"/>
    <path d="M -30 -20 L 0 0 L 30 -20" stroke="#64748b" stroke-width="1.5" fill="none" opacity="0.5"/>
    <line x1="-15" y1="-10" x2="15" y2="14" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="15" y1="-10" x2="-15" y2="14" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round"/>
    <text x="0" y="50" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#94a3b8">promo</text>
  </g>

  <!-- Promo 2 (X'd out) -->
  <g transform="translate(540, 235)">
    <rect x="-30" y="-20" width="60" height="40" rx="3" fill="#334155" stroke="#64748b" stroke-width="1.5" opacity="0.5"/>
    <path d="M -30 -20 L 0 0 L 30 -20" stroke="#64748b" stroke-width="1.5" fill="none" opacity="0.5"/>
    <line x1="-15" y1="-10" x2="15" y2="14" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="15" y1="-10" x2="-15" y2="14" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round"/>
    <text x="0" y="50" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#94a3b8">promo</text>
  </g>

  <!-- Bank (protected) -->
  <g transform="translate(660, 235)">
    <rect x="-30" y="-20" width="60" height="40" rx="3" fill="#1e293b" stroke="#22c55e" stroke-width="2.5"/>
    <path d="M -30 -20 L 0 0 L 30 -20" stroke="#22c55e" stroke-width="2" fill="none"/>
    <!-- Shield mini icon, top-right corner -->
    <g transform="translate(22, -27)">
      <path d="M 0 0 L -8 4 L -8 12 Q -8 18 0 22 Q 8 18 8 12 L 8 4 Z" fill="#22c55e"/>
      <path d="M -3 10 L -1 12 L 4 7" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="0" y="50" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#22c55e">bank</text>
  </g>

  <!-- Promo 3 (X'd out) -->
  <g transform="translate(780, 235)">
    <rect x="-30" y="-20" width="60" height="40" rx="3" fill="#334155" stroke="#64748b" stroke-width="1.5" opacity="0.5"/>
    <path d="M -30 -20 L 0 0 L 30 -20" stroke="#64748b" stroke-width="1.5" fill="none" opacity="0.5"/>
    <line x1="-15" y1="-10" x2="15" y2="14" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="15" y1="-10" x2="-15" y2="14" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round"/>
    <text x="0" y="50" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#94a3b8">promo</text>
  </g>

  <!-- Footer -->
  <text x="600" y="338" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#475569">9 AI providers · 6 safety layers · MIT · github.com/birdindasky/gmail-unsubscriber</text>
</svg>
